<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>明星一 | 体育明星馆</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="page-header">
    <a class="back-link" href="../../index.html">返回首页</a>
    <span>明星一展示页</span>
  </header>

  <main>
    <section class="hero">
      <div>
        <p class="eyebrow">Star Profile</p>
        <h1>明星姓名</h1>
        <p>这里填写运动项目、个人标语或一句简介。</p>
      </div>
    </section>

    <section class="content-grid">
      <article>
        <h2>基本信息</h2>
        <p>填写国籍、出生年份、运动项目、所属队伍等内容。</p>
      </article>
      <article>
        <h2>代表成就</h2>
        <p>填写冠军、纪录、奖项或重要比赛成绩。</p>
      </article>
      <article>
        <h2>高光时刻</h2>
        <p>可以放时间线、图片展示或一场代表性比赛。</p>
      </article>
      <article>
        <h2>个人评价</h2>
        <p>写出选择这位明星的原因，以及他/她带来的启发。</p>
      </article>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
